<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金分析工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-bottom: 20px;
        }

        .input-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
        }

        .input-field label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .input-field input {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .input-field input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .analyze-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .analyze-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .saved-fund-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #38ef7d;
            cursor: pointer;
            transition: all 0.3s;
        }

        .saved-fund-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .saved-fund-info {
            flex: 1;
        }

        .saved-fund-code {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .saved-fund-details {
            font-size: 0.9em;
            color: #666;
        }

        .delete-btn {
            padding: 8px 15px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .refresh-btn {
            padding: 8px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .refresh-btn:hover {
            background: #0056b3;
        }

        .action-buttons {
            display: flex;
            align-items: center;
        }

        .results {
            display: none;
        }

        .results.show {
            display: block;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-item {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .info-item label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
            display: block;
        }

        .info-item .value {
            color: #333;
            font-size: 1.2em;
            font-weight: 600;
        }

        .profit-loss {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .profit-card {
            padding: 25px;
            border-radius: 10px;
            text-align: center;
        }

        .profit-card.positive {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .profit-card.negative {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .profit-card.neutral {
            background: #f8f9fa;
            color: #333;
        }

        .profit-card .label {
            font-size: 0.9em;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .profit-card .amount {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .profit-card .percent {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .strategy {
            padding: 25px;
            background: #fff3cd;
            border-radius: 10px;
            border-left: 4px solid #ffc107;
            margin-bottom: 30px;
        }

        .strategy-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .strategy-badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            margin-right: 15px;
        }

        .strategy-badge.hold {
            background: #28a745;
            color: white;
        }

        .strategy-badge.sell {
            background: #dc3545;
            color: white;
        }

        .strategy-badge.buy {
            background: #007bff;
            color: white;
        }

        .strategy-badge.wait {
            background: #ffc107;
            color: #333;
        }

        .strategy-content {
            margin-bottom: 15px;
        }

        .strategy-content h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .strategy-reasons {
            list-style: none;
        }

        .strategy-reasons li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
        }

        .strategy-reasons li::before {
            content: '•';
            position: absolute;
            left: 5px;
            color: #667eea;
            font-weight: bold;
        }

        .strategy-meta {
            display: flex;
            gap: 20px;
            padding-top: 15px;
            border-top: 2px solid rgba(0,0,0,0.1);
        }

        .strategy-meta span {
            font-size: 0.9em;
            color: #666;
        }

        .strategy-meta strong {
            color: #333;
        }

        .chart-container {
            height: 400px;
            margin-top: 20px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #dc3545;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 基金分析工具</h1>
            <p>实时获取基金数据，智能分析买卖策略</p>
        </div>

        <!-- 已保存的基金列表 -->
        <div class="card" id="savedFundsCard" style="display: none;">
            <h2 style="margin-bottom: 20px; color: #333;">⭐ 已保存的基金</h2>
            <div id="savedFundsList"></div>
        </div>

        <div class="card">
            <div class="input-group">
                <div class="input-field">
                    <label for="fund_code">基金代码（6位数字）</label>
                    <input type="text" id="fund_code" placeholder="例如：000001" maxlength="6">
                </div>
                <div class="input-field">
                    <label for="buy_price">持仓成本（元）</label>
                    <input type="number" id="buy_price" placeholder="例如：1.5" step="0.0001">
                </div>
                <div class="input-field">
                    <label for="shares">持有份额</label>
                    <input type="number" id="shares" placeholder="例如：10000" step="0.01">
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="analyze-btn" onclick="analyzeFund()">🔍 分析基金</button>
                <button class="analyze-btn" onclick="saveCurrentFund()" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">💾 保存基金</button>
            </div>

            <!-- 自动刷新控制 -->
            <div class="refresh-toggle" id="refreshControl" style="display: none;">
                <label>
                    <input type="checkbox" id="autoRefreshCheck" onchange="toggleAutoRefresh()">
                    <span>自动刷新数据</span>
                </label>
                <div class="refresh-interval">
                    <span>间隔:</span>
                    <select id="refreshInterval" onchange="updateRefreshInterval()">
                        <option value="30">30秒</option>
                        <option value="60" selected>1分钟</option>
                        <option value="120">2分钟</option>
                        <option value="300">5分钟</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="loading" class="loading results">正在分析，请稍候...</div>
        <div id="error" class="error results"></div>

        <div id="results" class="results">
            <!-- 基金信息 -->
            <div class="card">
                <h2 style="margin-bottom: 20px; color: #333;">📈 基金信息</h2>
                <div class="info-grid" id="fundInfo"></div>
            </div>

            <!-- 盈亏计算 -->
            <div class="card">
                <h2 style="margin-bottom: 20px; color: #333;">💰 盈亏计算</h2>
                <div class="profit-loss" id="profitLoss"></div>
            </div>

            <!-- 策略分析 -->
            <div class="card">
                <h2 style="margin-bottom: 20px; color: #333;">🎯 策略建议</h2>
                <div id="strategy"></div>
            </div>

            <!-- 历史走势 -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="color: #333; margin: 0;">📊 历史净值走势</h2>
                    <div id="autoRefreshStatus" style="font-size: 0.9em; color: #666;"></div>
                </div>
                <div class="chart-container">
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let chart = null;
        let savedFunds = [];
        let autoRefreshTimer = null;
        let currentFundCode = '';
        let currentBuyPrice = 0;
        let currentShares = 0;

        // 页面加载时获取已保存的基金
        window.onload = function() {
            loadSavedFunds();
        };

        function loadSavedFunds() {
            const saved = localStorage.getItem('savedFunds');
            if (saved) {
                savedFunds = JSON.parse(saved);
                displaySavedFunds();
            }
        }

        function saveCurrentFund() {
            const fundCode = document.getElementById('fund_code').value.trim();
            const buyPrice = parseFloat(document.getElementById('buy_price').value);
            const shares = parseFloat(document.getElementById('shares').value);

            if (!fundCode || fundCode.length !== 6) {
                showError('请先输入有效的基金代码');
                return;
            }

            if (!buyPrice || buyPrice <= 0) {
                showError('请输入有效的持仓成本');
                return;
            }

            if (!shares || shares <= 0) {
                showError('请输入有效的持有份额');
                return;
            }

            // 检查是否已存在
            const existingIndex = savedFunds.findIndex(f => f.fund_code === fundCode);
            if (existingIndex >= 0) {
                savedFunds[existingIndex] = {
                    fund_code: fundCode,
                    buy_price: buyPrice,
                    shares: shares
                };
            } else {
                savedFunds.push({
                    fund_code: fundCode,
                    buy_price: buyPrice,
                    shares: shares
                });
            }

            localStorage.setItem('savedFunds', JSON.stringify(savedFunds));
            displaySavedFunds();
            alert('基金已保存！');
        }

        function displaySavedFunds() {
            const container = document.getElementById('savedFundsList');
            const card = document.getElementById('savedFundsCard');

            if (savedFunds.length === 0) {
                card.style.display = 'none';
                return;
            }

            card.style.display = 'block';
            container.innerHTML = savedFunds.map((fund, index) => `
                <div class="saved-fund-item" onclick="loadSavedFund('${fund.fund_code}', ${fund.buy_price}, ${fund.shares})">
                    <div class="saved-fund-info">
                        <div class="saved-fund-code">${fund.fund_code}</div>
                        <div class="saved-fund-details">
                            持仓成本: ${fund.buy_price} | 持有份额: ${fund.shares}
                        </div>
                    </div>
                    <div class="action-buttons" onclick="event.stopPropagation()">
                        <button class="refresh-btn" onclick="refreshFund('${fund.fund_code}', ${fund.buy_price}, ${fund.shares})">刷新</button>
                        <button class="delete-btn" onclick="deleteSavedFund('${fund.fund_code}')">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function loadSavedFund(fundCode, buyPrice, shares) {
            document.getElementById('fund_code').value = fundCode;
            document.getElementById('buy_price').value = buyPrice;
            document.getElementById('shares').value = shares;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function refreshFund(fundCode, buyPrice, shares) {
            document.getElementById('fund_code').value = fundCode;
            document.getElementById('buy_price').value = buyPrice;
            document.getElementById('shares').value = shares;
            analyzeFund();
        }

        function deleteSavedFund(fundCode) {
            if (confirm('确定要删除这个基金吗？')) {
                savedFunds = savedFunds.filter(f => f.fund_code !== fundCode);
                localStorage.setItem('savedFunds', JSON.stringify(savedFunds));
                displaySavedFunds();
            }
        }

        async function analyzeFund() {
            const fundCode = document.getElementById('fund_code').value;
            const buyPrice = parseFloat(document.getElementById('buy_price').value);
            const shares = parseFloat(document.getElementById('shares').value);

            // 隐藏结果
            document.getElementById('results').classList.remove('show');
            document.getElementById('error').classList.remove('show');
            document.getElementById('loading').classList.add('show');

            // 验证输入
            if (!fundCode || fundCode.length !== 6 || !/^\d{6}$/.test(fundCode)) {
                showError('请输入正确的6位基金代码');
                return;
            }

            if (!buyPrice || buyPrice <= 0) {
                showError('请输入有效的持仓成本');
                return;
            }

            if (!shares || shares <= 0) {
                showError('请输入有效的持有份额');
                return;
            }

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        fund_code: fundCode,
                        buy_price: buyPrice,
                        shares: shares
                    })
                });

                const result = await response.json();

                document.getElementById('loading').classList.remove('show');

                if (result.success) {
                    displayResults(result.data);
                } else {
                    showError(result.error || '分析失败，请重试');
                }
            } catch (error) {
                document.getElementById('loading').classList.remove('show');
                showError('网络错误，请检查连接后重试');
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        async function analyzeFund(autoRefresh = false) {
            const fundCode = document.getElementById('fund_code').value;
            const buyPrice = parseFloat(document.getElementById('buy_price').value);
            const shares = parseFloat(document.getElementById('shares').value);

            // 保存当前基金信息用于自动刷新
            currentFundCode = fundCode;
            currentBuyPrice = buyPrice;
            currentShares = shares;

            // 隐藏结果
            if (!autoRefresh) {
                document.getElementById('results').classList.remove('show');
                document.getElementById('error').classList.remove('show');
                document.getElementById('loading').classList.add('show');
            }

            // 验证输入
            if (!fundCode || fundCode.length !== 6 || !/^\d{6}$/.test(fundCode)) {
                showError('请输入正确的6位基金代码');
                return;
            }

            if (!buyPrice || buyPrice <= 0) {
                showError('请输入有效的持仓成本');
                return;
            }

            if (!shares || shares <= 0) {
                showError('请输入有效的持有份额');
                return;
            }

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        fund_code: fundCode,
                        buy_price: buyPrice,
                        shares: shares
                    })
                });

                const result = await response.json();

                document.getElementById('loading').classList.remove('show');

                if (result.success) {
                    displayResults(result.data);
                } else {
                    if (!autoRefresh) {
                        showError(result.error || '分析失败，请重试');
                    }
                }
            } catch (error) {
                document.getElementById('loading').classList.remove('show');
                if (!autoRefresh) {
                    showError('网络错误，请检查连接后重试');
                }
            }
        }
                <div class="info-item">
                    <label>基金代码</label>
                    <div class="value">${fundInfo.fund_code}</div>
                </div>
                <div class="info-item">
                    <label>单位净值</label>
                    <div class="value">${fundInfo.net_value.toFixed(4)}</div>
                </div>
                <div class="info-item">
                    <label>累计净值</label>
                    <div class="value">${fundInfo.accumulated_value.toFixed(4)}</div>
                </div>
                <div class="info-item">
                    <label>日增长率</label>
                    <div class="value">${fundInfo.day_growth.toFixed(2)}%</div>
                </div>
                <div class="info-item">
                    <label>最新净值日期</label>
                    <div class="value">${fundInfo.fund_name}</div>
                </div>
            `;

            // 显示盈亏
            const profitLoss = data.profit_loss;
            const totalProfitClass = profitLoss.total_profit >= 0 ? 'positive' : 'negative';
            const totalProfitSign = profitLoss.total_profit >= 0 ? '+' : '';
            const dayProfitClass = profitLoss.day_profit >= 0 ? 'positive' : 'negative';
            const dayProfitSign = profitLoss.day_profit >= 0 ? '+' : '';

            let profitLossHTML = `
                <div class="profit-card ${totalProfitClass}">
                    <div class="label">总盈亏</div>
                    <div class="amount">${totalProfitSign}${profitLoss.total_profit.toFixed(2)} 元</div>
                    <div class="percent">${totalProfitSign}${profitLoss.total_profit_percent.toFixed(2)}%</div>
                </div>
                <div class="profit-card neutral">
                    <div class="label">当前价值</div>
                    <div class="amount">${profitLoss.current_value.toFixed(2)} 元</div>
                </div>
                <div class="profit-card neutral">
                    <div class="label">持仓成本</div>
                    <div class="amount">${profitLoss.cost_value.toFixed(2)} 元</div>
                </div>
                <div class="profit-card ${dayProfitClass}">
                    <div class="label">当日盈亏（估算）</div>
                    <div class="amount">${dayProfitSign}${profitLoss.day_profit.toFixed(2)} 元</div>
                    <div class="percent">${dayProfitSign}${profitLoss.day_profit_percent.toFixed(2)}%</div>
                </div>
            `;

            document.getElementById('profitLoss').innerHTML = profitLossHTML;

            // 显示策略
            const strategy = data.strategy;
            const badgeMap = {
                '持有': 'hold',
                '持有或减仓': 'sell',
                '考虑加仓': 'buy',
                '观望': 'wait',
                '谨慎或减仓': 'sell',
                '谨慎': 'wait'
            };
            const badgeClass = badgeMap[strategy.recommendation] || 'wait';

            document.getElementById('strategy').innerHTML = `
                <div class="strategy">
                    <div class="strategy-header">
                        <span class="strategy-badge ${badgeClass}">${strategy.recommendation}</span>
                    </div>
                    <div class="strategy-content">
                        <h3>分析建议</h3>
                        <ul class="strategy-reasons">
                            ${strategy.reasons.map(reason => `<li>${reason}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="strategy-meta">
                        <span>风险等级：<strong>${strategy.risk_level}</strong></span>
                        <span>信心度：<strong>${strategy.confidence}%</strong></span>
                    </div>
                </div>
            `;

            // 显示图表
            if (data.history && data.history.length > 0) {
                displayChart(data.history);
            } else {
                // 如果没有历史数据，显示提示
                const chartContainer = document.getElementById('chart').parentElement;
                chartContainer.innerHTML = '<p style="text-align: center; color: #666; padding: 50px;">暂无历史净值数据</p>';
            }

            // 显示结果区域
            document.getElementById('results').classList.add('show');
        }

        function displayChart(history) {
            // 检查canvas元素是否存在
            const canvas = document.getElementById('chart');
            if (!canvas) {
                return;
            }

            const ctx = canvas.getContext('2d');

            if (chart) {
                chart.destroy();
            }

            // 格式化日期：从 2024-01-15 变为 01-15
            const labels = history.map(h => {
                const date = new Date(h.date);
                return `${(date.getMonth() + 1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')}`;
            });

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '单位净值',
                        data: history.map(h => h.net_value),
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function(context) {
                                    return `净值: ${context.parsed.y.toFixed(4)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                maxTicksLimit: 10
                            }
                        },
                        y: {
                            beginAtZero: false,
                            grid: {
                                color: 'rgba(0,0,0,0.05)'
                            },
                            ticks: {
                                callback: function(value) {
                                    return value.toFixed(3);
                                }
                            }
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });
        }

        // 回车键触发分析
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyzeFund();
            }
        });
    </script>
</body>
</html>
