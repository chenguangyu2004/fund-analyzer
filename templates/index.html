<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金分析工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-bottom: 20px;
        }

        .input-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
        }

        .input-field label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .input-field input {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .input-field input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .analyze-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .analyze-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .results {
            display: none;
        }

        .results.show {
            display: block;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-item {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .info-item label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
            display: block;
        }

        .info-item .value {
            color: #333;
            font-size: 1.2em;
            font-weight: 600;
        }

        .profit-loss {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .profit-card {
            padding: 25px;
            border-radius: 10px;
            text-align: center;
        }

        .profit-card.positive {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .profit-card.negative {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .profit-card.neutral {
            background: #f8f9fa;
            color: #333;
        }

        .profit-card .label {
            font-size: 0.9em;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .profit-card .amount {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .profit-card .percent {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .strategy {
            padding: 25px;
            background: #fff3cd;
            border-radius: 10px;
            border-left: 4px solid #ffc107;
            margin-bottom: 30px;
        }

        .strategy-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .strategy-badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            margin-right: 15px;
        }

        .strategy-badge.hold {
            background: #28a745;
            color: white;
        }

        .strategy-badge.sell {
            background: #dc3545;
            color: white;
        }

        .strategy-badge.buy {
            background: #007bff;
            color: white;
        }

        .strategy-badge.wait {
            background: #ffc107;
            color: #333;
        }

        .strategy-content {
            margin-bottom: 15px;
        }

        .strategy-content h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .strategy-reasons {
            list-style: none;
        }

        .strategy-reasons li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
        }

        .strategy-reasons li::before {
            content: '•';
            position: absolute;
            left: 5px;
            color: #667eea;
            font-weight: bold;
        }

        .strategy-meta {
            display: flex;
            gap: 20px;
            padding-top: 15px;
            border-top: 2px solid rgba(0,0,0,0.1);
        }

        .strategy-meta span {
            font-size: 0.9em;
            color: #666;
        }

        .strategy-meta strong {
            color: #333;
        }

        .chart-container {
            height: 400px;
            margin-top: 20px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #dc3545;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .saved-fund-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #38ef7d;
            cursor: pointer;
            transition: all 0.3s;
        }

        .saved-fund-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .saved-fund-info {
            flex: 1;
        }

        .saved-fund-code {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .saved-fund-details {
            font-size: 0.9em;
            color: #666;
        }

        .delete-btn {
            padding: 8px 15px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .refresh-btn {
            padding: 8px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .refresh-btn:hover {
            background: #0056b3;
        }

        .action-buttons {
            display: flex;
            align-items: center;
        }

        .refresh-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .refresh-toggle label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            color: #666;
        }

        .refresh-toggle input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .refresh-interval {
            margin-left: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .refresh-interval select {
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .data-source {
            font-size: 0.8em;
            color: #999;
            margin-top: 10px;
        }

        .realtime-badge {
            background: #28a745;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-left: 10px;
        }

        .close-badge {
            background: #ffc107;
            color: #333;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-left: 10px;
        }

        .net-value-compare {
            background: #f0f7ff;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .net-value-compare h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.1em;
        }

        .value-compare-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .value-box {
            padding: 15px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid;
        }

        .value-box.official {
            border-left-color: #ffc107;
        }

        .value-box.realtime {
            border-left-color: #28a745;
        }

        .value-box .title {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
        }

        .value-box .value {
            font-size: 1.8em;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .value-box .change {
            font-size: 1em;
            margin-bottom: 5px;
        }

        .value-box .change.positive {
            color: #28a745;
        }

        .value-box .change.negative {
            color: #dc3545;
        }

        .value-box .note {
            font-size: 0.8em;
            color: #999;
        }

        .holdings-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .holdings-table th {
            background: #f8f9fa;
            color: #333;
            font-weight: 600;
            padding: 12px 15px;
            text-align: left;
            border-bottom: 2px solid #dee2e6;
        }

        .holdings-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .holdings-table tr:hover {
            background: #f8f9fa;
        }

        .stock-change {
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .stock-change.positive {
            background: #d4edda;
            color: #155724;
        }

        .stock-change.negative {
            background: #f8d7da;
            color: #721c24;
        }

        .stock-change.neutral {
            background: #e2e3e5;
            color: #6c757d;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 基金分析工具</h1>
            <p>实时获取基金数据，智能分析买卖策略</p>
        </div>

        <!-- 已保存的基金列表 -->
        <div class="card" id="savedFundsCard" style="display: none;">
            <h2 style="margin-bottom: 20px; color: #333;">⭐ 已保存的基金</h2>
            <div id="savedFundsList"></div>
        </div>

        <div class="card">
            <div class="input-group">
                <div class="input-field">
                    <label for="fund_code">基金代码（6位数字）</label>
                    <input type="text" id="fund_code" placeholder="例如：000001" maxlength="6">
                </div>
                <div class="input-field">
                    <label for="buy_price">持仓成本（元）</label>
                    <input type="number" id="buy_price" placeholder="例如：1.5" step="0.0001">
                </div>
                <div class="input-field">
                    <label for="shares">持有份额</label>
                    <input type="number" id="shares" placeholder="例如：10000" step="0.01">
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="analyze-btn" onclick="analyzeFund()">🔍 分析基金</button>
                <button class="analyze-btn" onclick="saveCurrentFund()" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">💾 保存基金</button>
            </div>

            <!-- 自动刷新控制 -->
            <div class="refresh-toggle" id="refreshControl" style="display: none;">
                <label>
                    <input type="checkbox" id="autoRefreshCheck" onchange="toggleAutoRefresh()">
                    <span>自动刷新数据（交易时间有效）</span>
                </label>
                <div class="refresh-interval">
                    <span>间隔:</span>
                    <select id="refreshInterval" onchange="updateRefreshInterval()">
                        <option value="30">30秒</option>
                        <option value="60" selected>1分钟</option>
                        <option value="120">2分钟</option>
                        <option value="300">5分钟</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="loading" class="loading results">正在分析，请稍候...</div>
        <div id="error" class="error results"></div>

        <div id="results" class="results">
            <!-- 基金信息 -->
            <div class="card">
                <h2 style="margin-bottom: 20px; color: #333;">📈 基金信息</h2>
                <div class="info-grid" id="fundInfo"></div>
                <div class="data-source" id="dataSource"></div>

                <!-- 净值对比 -->
                <div class="net-value-compare" id="netValueCompare" style="display: none;">
                    <h3>💹 净值对比</h3>
                    <div class="value-compare-grid">
                        <div class="value-box official">
                            <div class="title">🟡 官方收盘净值</div>
                            <div class="value" id="officialValue"></div>
                            <div class="change" id="officialChange"></div>
                            <div class="note" id="officialDate"></div>
                        </div>
                        <div class="value-box realtime">
                            <div class="title">🟢 实时估算净值</div>
                            <div class="value" id="realtimeValue"></div>
                            <div class="change" id="realtimeChange"></div>
                            <div class="note" id="realtimeNote"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 盈亏计算 -->
            <div class="card">
                <h2 style="margin-bottom: 20px; color: #333;">💰 盈亏计算</h2>
                <div class="profit-loss" id="profitLoss"></div>
            </div>

            <!-- 策略分析 -->
            <div class="card">
                <h2 style="margin-bottom: 20px; color: #333;">🎯 策略建议</h2>
                <div id="strategy"></div>
            </div>

            <!-- 前十大持仓 -->
            <div class="card">
                <h2 style="margin-bottom: 20px; color: #333;">📊 前十大持仓股票</h2>
                <div id="holdings"></div>
            </div>

            <!-- 历史走势 -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="color: #333; margin: 0;">📈 历史净值走势</h2>
                    <div id="autoRefreshStatus" style="font-size: 0.9em; color: #666;"></div>
                </div>
                <div class="chart-container">
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let chart = null;
        let savedFunds = [];
        let autoRefreshTimer = null;
        let currentFundCode = '';
        let currentBuyPrice = 0;
        let currentShares = 0;

        // 页面加载时获取已保存的基金
        window.onload = function() {
            loadSavedFunds();
        };

        function loadSavedFunds() {
            const saved = localStorage.getItem('savedFunds');
            if (saved) {
                savedFunds = JSON.parse(saved);
                displaySavedFunds();
            }
        }

        function saveCurrentFund() {
            const fundCode = document.getElementById('fund_code').value.trim();
            const buyPrice = parseFloat(document.getElementById('buy_price').value);
            const shares = parseFloat(document.getElementById('shares').value);

            if (!fundCode || fundCode.length !== 6) {
                showError('请先输入有效的基金代码');
                return;
            }

            if (!buyPrice || buyPrice <= 0) {
                showError('请输入有效的持仓成本');
                return;
            }

            if (!shares || shares <= 0) {
                showError('请输入有效的持有份额');
                return;
            }

            const existingIndex = savedFunds.findIndex(f => f.fund_code === fundCode);
            if (existingIndex >= 0) {
                savedFunds[existingIndex] = {
                    fund_code: fundCode,
                    buy_price: buyPrice,
                    shares: shares
                };
            } else {
                savedFunds.push({
                    fund_code: fundCode,
                    buy_price: buyPrice,
                    shares: shares
                });
            }

            localStorage.setItem('savedFunds', JSON.stringify(savedFunds));
            displaySavedFunds();
            alert('基金已保存！');
        }

        function displaySavedFunds() {
            const container = document.getElementById('savedFundsList');
            const card = document.getElementById('savedFundsCard');

            if (savedFunds.length === 0) {
                card.style.display = 'none';
                return;
            }

            card.style.display = 'block';
            container.innerHTML = savedFunds.map((fund, index) => `
                <div class="saved-fund-item" onclick="loadSavedFund('${fund.fund_code}', ${fund.buy_price}, ${fund.shares})">
                    <div class="saved-fund-info">
                        <div class="saved-fund-code">${fund.fund_code}</div>
                        <div class="saved-fund-details">
                            持仓成本: ${fund.buy_price} | 持有份额: ${fund.shares}
                        </div>
                    </div>
                    <div class="action-buttons" onclick="event.stopPropagation()">
                        <button class="refresh-btn" onclick="refreshFund('${fund.fund_code}', ${fund.buy_price}, ${fund.shares})">刷新</button>
                        <button class="delete-btn" onclick="deleteSavedFund('${fund.fund_code}')">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function loadSavedFund(fundCode, buyPrice, shares) {
            document.getElementById('fund_code').value = fundCode;
            document.getElementById('buy_price').value = buyPrice;
            document.getElementById('shares').value = shares;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function refreshFund(fundCode, buyPrice, shares) {
            document.getElementById('fund_code').value = fundCode;
            document.getElementById('buy_price').value = buyPrice;
            document.getElementById('shares').value = shares;
            analyzeFund();
        }

        function deleteSavedFund(fundCode) {
            if (confirm('确定要删除这个基金吗？')) {
                savedFunds = savedFunds.filter(f => f.fund_code !== fundCode);
                localStorage.setItem('savedFunds', JSON.stringify(savedFunds));
                displaySavedFunds();
            }
        }

        async function analyzeFund(autoRefresh = false) {
            const fundCode = document.getElementById('fund_code').value;
            const buyPrice = parseFloat(document.getElementById('buy_price').value);
            const shares = parseFloat(document.getElementById('shares').value);

            currentFundCode = fundCode;
            currentBuyPrice = buyPrice;
            currentShares = shares;

            if (!autoRefresh) {
                document.getElementById('results').classList.remove('show');
                document.getElementById('error').classList.remove('show');
                document.getElementById('loading').classList.add('show');
            }

            if (!fundCode || fundCode.length !== 6 || !/^\d{6}$/.test(fundCode)) {
                showError('请输入正确的6位基金代码');
                return;
            }

            if (!buyPrice || buyPrice <= 0) {
                showError('请输入有效的持仓成本');
                return;
            }

            if (!shares || shares <= 0) {
                showError('请输入有效的持有份额');
                return;
            }

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        fund_code: fundCode,
                        buy_price: buyPrice,
                        shares: shares
                    })
                });

                const result = await response.json();

                document.getElementById('loading').classList.remove('show');

                if (result.success) {
                    displayResults(result.data);
                } else {
                    if (!autoRefresh) {
                        showError(result.error || '分析失败，请重试');
                    }
                }
            } catch (error) {
                document.getElementById('loading').classList.remove('show');
                if (!autoRefresh) {
                    showError('网络错误，请检查连接后重试');
                }
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function toggleAutoRefresh() {
            const checkbox = document.getElementById('autoRefreshCheck');
            if (checkbox.checked) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
        }

        function startAutoRefresh() {
            const interval = parseInt(document.getElementById('refreshInterval').value);
            if (autoRefreshTimer) {
                clearInterval(autoRefreshTimer);
            }
            autoRefreshTimer = setInterval(() => {
                analyzeFund(true);
            }, interval * 1000);
            updateRefreshStatus('🔄 正在自动刷新...');
        }

        function stopAutoRefresh() {
            if (autoRefreshTimer) {
                clearInterval(autoRefreshTimer);
                autoRefreshTimer = null;
            }
            updateRefreshStatus('');
        }

        function updateRefreshInterval() {
            if (document.getElementById('autoRefreshCheck').checked) {
                startAutoRefresh();
            }
        }

        function updateRefreshStatus(text) {
            document.getElementById('autoRefreshStatus').textContent = text;
        }

        function displayResults(data) {
            document.getElementById('refreshControl').style.display = 'block';

            const fundInfo = data.fund_info;

            // 显示基金基本信息
            let usedValueLabel = fundInfo.has_realtime ? '实时估算净值' : '官方收盘净值';
            let usedValueBadge = fundInfo.has_realtime ? '<span class="realtime-badge">实时</span>' : '<span class="close-badge">收盘</span>';

            document.getElementById('fundInfo').innerHTML = `
                <div class="info-item">
                    <label>基金代码</label>
                    <div class="value">${fundInfo.fund_code}</div>
                </div>
                <div class="info-item">
                    <label>基金名称</label>
                    <div class="value">${fundInfo.fund_name}</div>
                </div>
                <div class="info-item">
                    <label>${usedValueLabel}</label>
                    <div class="value">${fundInfo.net_value.toFixed(4)} ${usedValueBadge}</div>
                </div>
                <div class="info-item">
                    <label>累计净值</label>
                    <div class="value">${fundInfo.accumulated_value > 0 ? fundInfo.accumulated_value.toFixed(4) : '暂无数据'}</div>
                </div>
                <div class="info-item">
                    <label>日增长率</label>
                    <div class="value">${fundInfo.day_growth.toFixed(2)}%</div>
                </div>
                <div class="info-item">
                    <label>更新时间</label>
                    <div class="value">${fundInfo.update_time}</div>
                </div>
            `;

            document.getElementById('dataSource').textContent =
                `💡 官方净值日期：${fundInfo.official_nav_date}`;

            // 显示净值对比（如果同时有官方和实时数据）
            const netValueCompare = document.getElementById('netValueCompare');
            if (fundInfo.has_realtime) {
                netValueCompare.style.display = 'block';

                // 官方净值
                const officialValue = fundInfo.official_net_value;
                const officialGrowth = fundInfo.official_day_growth;
                const officialClass = officialGrowth >= 0 ? 'positive' : 'negative';
                const officialSign = officialGrowth >= 0 ? '+' : '';

                document.getElementById('officialValue').textContent = officialValue.toFixed(4);
                document.getElementById('officialChange').textContent =
                    `${officialSign}${officialGrowth.toFixed(2)}%`;
                document.getElementById('officialChange').className = `change ${officialClass}`;
                document.getElementById('officialDate').textContent = `日期: ${fundInfo.official_nav_date}`;

                // 实时估算净值
                const realtimeValue = fundInfo.realtime_net_value;
                const realtimeGrowth = fundInfo.realtime_day_growth;
                const realtimeClass = realtimeGrowth >= 0 ? 'positive' : 'negative';
                const realtimeSign = realtimeGrowth >= 0 ? '+' : '';

                document.getElementById('realtimeValue').textContent = realtimeValue.toFixed(4);
                document.getElementById('realtimeChange').textContent =
                    `${realtimeSign}${realtimeGrowth.toFixed(2)}%`;
                document.getElementById('realtimeChange').className = `change ${realtimeClass}`;

                // 计算实时与官方的差异
                const diff = realtimeValue - officialValue;
                const diffPercent = (diff / officialValue) * 100;
                const diffClass = diff >= 0 ? 'positive' : 'negative';
                const diffSign = diff >= 0 ? '+' : '';

                document.getElementById('realtimeNote').textContent =
                    `较官方${diffSign}${diffPercent.toFixed(3)}% (更新: ${fundInfo.update_time})`;
            } else {
                netValueCompare.style.display = 'none';
            }

            const profitLoss = data.profit_loss;
            const totalProfitClass = profitLoss.total_profit >= 0 ? 'positive' : 'negative';
            const totalProfitSign = profitLoss.total_profit >= 0 ? '+' : '';
            const dayProfitClass = profitLoss.day_profit >= 0 ? 'positive' : 'negative';
            const dayProfitSign = profitLoss.day_profit >= 0 ? '+' : '';

            let profitLossHTML = `
                <div class="profit-card ${totalProfitClass}">
                    <div class="label">总盈亏</div>
                    <div class="amount">${totalProfitSign}${profitLoss.total_profit.toFixed(2)} 元</div>
                    <div class="percent">${totalProfitSign}${profitLoss.total_profit_percent.toFixed(2)}%</div>
                </div>
                <div class="profit-card neutral">
                    <div class="label">当前价值</div>
                    <div class="amount">${profitLoss.current_value.toFixed(2)} 元</div>
                </div>
                <div class="profit-card neutral">
                    <div class="label">持仓成本</div>
                    <div class="amount">${profitLoss.cost_value.toFixed(2)} 元</div>
                </div>
                <div class="profit-card ${dayProfitClass}">
                    <div class="label">当日盈亏（估算）</div>
                    <div class="amount">${dayProfitSign}${profitLoss.day_profit.toFixed(2)} 元</div>
                    <div class="percent">${dayProfitSign}${profitLoss.day_profit_percent.toFixed(2)}%</div>
                </div>
            `;

            document.getElementById('profitLoss').innerHTML = profitLossHTML;

            const strategy = data.strategy;
            const badgeMap = {
                '持有': 'hold',
                '持有或减仓': 'sell',
                '考虑加仓': 'buy',
                '观望': 'wait',
                '谨慎或减仓': 'sell',
                '谨慎': 'wait'
            };
            const badgeClass = badgeMap[strategy.recommendation] || 'wait';

            document.getElementById('strategy').innerHTML = `
                <div class="strategy">
                    <div class="strategy-header">
                        <span class="strategy-badge ${badgeClass}">${strategy.recommendation}</span>
                    </div>
                    <div class="strategy-content">
                        <h3>分析建议</h3>
                        <ul class="strategy-reasons">
                            ${strategy.reasons.map(reason => `<li>${reason}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="strategy-meta">
                        <span>风险等级：<strong>${strategy.risk_level}</strong></span>
                        <span>信心度：<strong>${strategy.confidence}%</strong></span>
                    </div>
                </div>
            `;

            // 显示持仓数据
            if (data.holdings && data.holdings.length > 0) {
                displayHoldings(data.holdings);
            } else {
                document.getElementById('holdings').innerHTML = '<p style="text-align: center; color: #666; padding: 50px;">暂无持仓数据</p>';
            }

            if (data.history && data.history.length > 0) {
                displayChart(data.history);
            } else {
                const chartContainer = document.getElementById('chart').parentElement;
                chartContainer.innerHTML = '<p style="text-align: center; color: #666; padding: 50px;">暂无历史净值数据</p>';
            }

            document.getElementById('results').classList.add('show');
        }

        function displayChart(history) {
            const canvas = document.getElementById('chart');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');

            if (chart) {
                chart.destroy();
            }

            const labels = history.map(h => {
                const date = new Date(h.date);
                return `${(date.getMonth() + 1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')}`;
            });

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '单位净值',
                        data: history.map(h => h.net_value),
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function(context) {
                                    return `净值: ${context.parsed.y.toFixed(4)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                maxTicksLimit: 10
                            }
                        },
                        y: {
                            beginAtZero: false,
                            grid: {
                                color: 'rgba(0,0,0,0.05)'
                            },
                            ticks: {
                                callback: function(value) {
                                    return value.toFixed(3);
                                }
                            }
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyzeFund();
            }
        });

        function displayHoldings(holdings) {
            let html = `
                <table class="holdings-table">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>股票代码</th>
                            <th>股票名称</th>
                            <th>最新价</th>
                            <th>涨跌幅</th>
                            <th>占净值比例</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            holdings.forEach(h => {
                // 处理价格和涨跌幅
                let priceHtml = h.price !== null && h.price !== undefined ?
                    `<strong style="color: #333;">${h.price.toFixed(2)}</strong>` :
                    '<span style="color: #999;">--</span>';

                let changeClass = 'neutral';
                let changeSign = '';
                let changeHtml = '<span style="color: #999;">--</span>';

                if (h.change_pct !== null && h.change_pct !== undefined) {
                    changeClass = h.change_pct > 0 ? 'positive' : (h.change_pct < 0 ? 'negative' : 'neutral');
                    changeSign = h.change_pct > 0 ? '+' : '';
                    changeHtml = `<span class="stock-change ${changeClass}">${changeSign}${h.change_pct.toFixed(2)}%</span>`;
                }

                html += `
                    <tr>
                        <td>${h.seq}</td>
                        <td><a href="https://quote.eastmoney.com/${h.code}" target="_blank" style="color: #667eea;">${h.code}</a></td>
                        <td><a href="https://quote.eastmoney.com/${h.code}" target="_blank" style="color: #333; font-weight: 600;">${h.name}</a></td>
                        <td>${priceHtml}</td>
                        <td>${changeHtml}</td>
                        <td><strong>${h.ratio}</strong></td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
                <div style="margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 8px; font-size: 0.9em; color: #666;">
                    💡 提示：价格数据可能受反爬虫限制无法获取。如显示"--"，请点击股票代码查看详情。
                </div>
            `;

            document.getElementById('holdings').innerHTML = html;
        }
    </script>
</body>
</html>
