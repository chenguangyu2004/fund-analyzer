        function displayStrategyAnalysis(data) {
            const container = document.getElementById('strategyAnalysisContent');
            const grid = document.getElementById('strategyGrid');
            const overall = document.getElementById('overallText');

            container.classList.remove('hidden');

            // 长期稳定性（持有决策）
            const lt = data.long_term_stability;
            const ltIcon = lt.recommendation === '持有' ? 'fa-shield-alt' : (lt.recommendation === '不建议持有' ? 'fa-exclamation-triangle' : 'fa-clock');
            const ltBadge = lt.recommendation === '持有' ? 'hold' : (lt.recommendation === '不建议持有' ? 'sell' : 'watch');
            const ltScore = lt.score > 70 ? 'high' : (lt.score > 40 ? 'medium' : 'low');

            // 下跌预测（卖出决策）
            const ds = data.downside_prediction;
            const dsIcon = ds.recommendation === '卖出' ? 'fa-arrow-down' : (ds.recommendation === '谨慎' ? 'fa-exclamation-circle' : 'fa-check');
            const dsBadge = ds.recommendation === '卖出' ? 'sell' : (ds.recommendation === '谨慎' ? 'watch' : 'hold');
            const dsScore = ds.score > 70 ? 'high' : (ds.score > 40 ? 'medium' : 'low');

            // 上涨预测（买入决策）
            const us = data.upside_prediction;
            const usIcon = us.recommendation === '买入' ? 'fa-arrow-up' : (us.recommendation === '可考虑买入' ? 'fa-plus-circle' : 'fa-minus-circle');
            const usBadge = us.recommendation === '买入' ? 'buy' : (us.recommendation === '可考虑买入' ? 'buy' : 'watch');
            const usScore = us.score > 70 ? 'high' : (us.score > 40 ? 'medium' : 'low');

            grid.innerHTML = `
                <!-- 长期稳定性 -->
                <div class="strategy-card ${ltBadge}">
                    <div class="strategy-header">
                        <span class="strategy-title"><i class="fas ${ltIcon}"></i> 长期稳定性</span>
                        <span class="strategy-badge ${ltBadge}">${lt.recommendation || '分析中'}</span>
                    </div>
                    <div class="strategy-score ${ltScore}">${lt.score || 0}</div>
                    <div class="strategy-metrics">
                        <span class="strategy-metric">Sharpe: ${lt.sharpe_ratio != null ? lt.sharpe_ratio : '--'}</span>
                        <span class="strategy-metric">最大回撤: ${lt.max_drawdown != null ? lt.max_drawdown + '%' : '--'}</span>
                        <span class="strategy-metric">波动率: ${lt.volatility != null ? lt.volatility + '%' : '--'}</span>
                    </div>
                    <div class="strategy-reason">${lt.reason || '暂无分析'}</div>
                </div>

                <!-- 下跌预测 -->
                <div class="strategy-card ${dsBadge}">
                    <div class="strategy-header">
                        <span class="strategy-title"><i class="fas ${dsIcon}"></i> 下跌风险预测</span>
                        <span class="strategy-badge ${dsBadge}">${ds.recommendation || '分析中'}</span>
                    </div>
                    <div class="strategy-score ${dsScore}">${ds.score || 0}</div>
                    <div class="strategy-metrics">
                        <span class="strategy-metric">趋势斜率: ${ds.trend_slope != null ? ds.trend_slope + '%' : '--'}</span>
                        <span class="strategy-metric">VaR(95%): ${ds.var_95 != null ? ds.var_95 + '%' : '--'}</span>
                        <span class="strategy-metric">1年下跌概率: ${ds.prob_loss_1y != null ? ds.prob_loss_1y + '%' : '--'}</span>
                    </div>
                    <div class="strategy-reason">${ds.reason || '暂无分析'}</div>
                </div>

                <!-- 上涨预测 -->
                <div class="strategy-card ${usBadge}">
                    <div class="strategy-header">
                        <span class="strategy-title"><i class="fas ${usIcon}"></i> 上涨动能预测</span>
                        <span class="strategy-badge ${usBadge}">${us.recommendation || '分析中'}</span>
                    </div>
                    <div class="strategy-score ${usScore}">${us.score || 0}</div>
                    <div class="strategy-metrics">
                        <span class="strategy-metric">MACD: ${us.macd_signal || '--'}</span>
                        <span class="strategy-metric">预测收益: ${us.predicted_return != null ? us.predicted_return + '%' : '--'}</span>
                        <span class="strategy-metric">20日动量: ${us.momentum_20d != null ? us.momentum_20d + '%' : '--'}</span>
                    </div>
                    <div class="strategy-reason">${us.reason || '暂无分析'}</div>
                </div>
            `;

            overall.textContent = `${data.overall_recommendation || '观望'}（置信度: ${data.confidence || 0}%）`;
        }

        // ===== AI问答 =====
        function toggleChatDrawer() {
            document.getElementById('chatDrawer').classList.toggle('open');
        }

        function appendChatMessage(role, text) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `chat-msg ${role}`;
            div.innerHTML = `<div class="chat-msg-content">${text}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const question = input.value.trim();
            if (!question) return;

            appendChatMessage('user', question);
            input.value = '';

            appendChatMessage('ai', '正在思考...');

            try {
                const response = await fetch('/api/ai-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fund_code: currentFundCode,
                        fund_info: currentFundInfo,
                        holdings: currentHoldings,
                        question: question
                    })
                });

                const result = await response.json();
                const msgs = document.querySelectorAll('.chat-msg.ai');
                const lastMsg = msgs[msgs.length - 1];

                if (result.success && result.data) {
                    lastMsg.querySelector('.chat-msg-content').textContent = result.data.answer || '抱歉，暂时无法回答';
                } else {
                    lastMsg.querySelector('.chat-msg-content').textContent = '回答失败: ' + (result.error || '请稍后重试');
                }
            } catch (e) {
                const msgs = document.querySelectorAll('.chat-msg.ai');
                const lastMsg = msgs[msgs.length - 1];
                lastMsg.querySelector('.chat-msg-content').textContent = '网络错误';
            }
        }

        // ===== 股票详情抽屉 =====
        function openStockDrawer(code, name) {
            document.getElementById('stockDrawerTitle').textContent = `${name} (${code})`;
            document.getElementById('stockDrawerContent').innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>加载中...</p></div>';
            document.getElementById('stockOverlay').classList.add('open');
            document.getElementById('stockDrawer').classList.add('open');

            loadStockDetail(code, name);
        }

        function closeStockDrawer() {
            document.getElementById('stockOverlay').classList.remove('open');
            document.getElementById('stockDrawer').classList.remove('open');
        }

        async function loadStockDetail(code, name) {
            try {
                const resp = await fetch(`/api/stock/${code}`);
                const result = await resp.json();

                if (result.success && result.data) {
                    displayStockDetail(result.data);
                } else {
                    document.getElementById('stockDrawerContent').innerHTML = `
                        <div class="error-message">加载失败: ${result.error || '未知错误'}</div>
                    `;
                }
            } catch (e) {
                document.getElementById('stockDrawerContent').innerHTML = `
                    <div class="error-message">网络错误</div>
                `;
            }
        }

        function displayStockDetail(data) {
            const isPositive = data.change_pct >= 0;
            const changeClass = isPositive ? 'positive' : 'negative';
            const changeSign = isPositive ? '+' : '';

            let html = `
                <div class="stock-price-display">
                    <div class="stock-price-value">${data.price > 0 ? data.price.toFixed(2) : '--'}</div>
                    <div class="stock-price-change ${changeClass}">
                        ${data.change_pct !== 0 ? `${changeSign}${data.change || 0} (${changeSign}${data.change_pct}%)` : '--'}
                    </div>
                </div>

                <div class="card" style="margin-bottom: 16px;">
                    <div class="card-title" style="margin-bottom: 12px;"><i class="fas fa-chart-bar"></i> K线图</div>
                    <div class="stock-kline-container" id="stockKline"></div>
                </div>

                <div class="card" style="margin-bottom: 16px;">
                    <div class="card-title" style="margin-bottom: 12px;"><i class="fas fa-newspaper"></i> 相关新闻</div>
                    <div class="stock-news-list">
            `;

            if (data.news && data.news.length > 0) {
                data.news.slice(0, 5).forEach(n => {
                    html += `
                        <div class="stock-news-item">
                            <div class="stock-news-title">${n.title || ''}</div>
                            <div class="stock-news-meta">${n.publish_time || ''} · ${n.source || ''}</div>
                        </div>
                    `;
                });
            } else {
                html += '<div class="empty-state"><p>暂无新闻</p></div>';
            }

            html += `
                    </div>
                </div>

                <div class="card">
                    <div class="card-title" style="margin-bottom: 12px;"><i class="fas fa-trophy"></i> 行业龙头股</div>
                    <div class="industry-stocks-grid">
            `;

            if (data.industry_leaders && data.industry_leaders.length > 0) {
                data.industry_leaders.slice(0, 6).forEach(s => {
                    const changePct = s.change_pct || 0;
                    const cls = changePct > 0 ? 'positive' : (changePct < 0 ? 'negative' : 'neutral');
                    const sign = changePct > 0 ? '+' : '';
                    html += `
                        <div class="industry-stock-item" onclick="openStockDrawer('${s.code}', '${s.name}')">
                            <div style="font-weight: 600;">${s.name}</div>
                            <div style="font-size: 0.8em; color: var(--text-muted);">${s.code}</div>
                            <div style="margin-top: 6px;">
                                <span style="font-weight: 600;">${s.price > 0 ? s.price.toFixed(2) : '--'}</span>
                                <span class="change-tag ${cls}" style="margin-left: 6px;">${changePct !== 0 ? `${sign}${changePct.toFixed(2)}%` : '--'}</span>
                            </div>
                        </div>
                    `;
                });
            } else {
                html += '<div class="empty-state"><p>暂无数据</p></div>';
            }

            html += '</div></div>';
            document.getElementById('stockDrawerContent').innerHTML = html;

            // 加载K线图
            loadStockKline(data.code);
        }

        async function loadStockKline(code) {
            try {
                const resp = await fetch(`/api/stock/${code}/kline?period=daily&limit=60`);
                const result = await resp.json();

                if (result.success && result.data && result.data.length > 0) {
                    renderStockKline(result.data);
                }
            } catch (e) {
                console.log('K线加载失败', e);
            }
        }

        function renderStockKline(data) {
            const container = document.getElementById('stockKline');
            if (!container) return;

            const klineChart = echarts.init(container);

            const dates = data.map(item => item.date);
            const ohlc = data.map(item => [item.open, item.close, item.low, item.high]);
            const volumes = data.map(item => item.volume);

            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(30, 41, 59, 0.95)',
                    borderColor: '#334155',
                    textStyle: { color: '#f8fafc' }
                },
                grid: [
                    { left: '10%', right: '8%', top: '10%', height: '55%' },
                    { left: '10%', right: '8%', top: '72%', height: '15%' }
                ],
                xAxis: [
                    { type: 'category', data: dates, gridIndex: 0, axisLabel: { show: false }, splitLine: { show: false } },
                    { type: 'category', data: dates, gridIndex: 1, axisLabel: { color: '#64748b' }, splitLine: { show: false } }
                ],
                yAxis: [
                    { scale: true, gridIndex: 0, axisLabel: { color: '#64748b' }, splitLine: { color: '#1e293b' } },
                    { scale: true, gridIndex: 1, splitNumber: 2, axisLabel: { color: '#64748b' } }
                ],
                dataZoom: [
                    { type: 'inside', xAxisIndex: [0, 1], start: 70, end: 100 },
                    { type: 'slider', xAxisIndex: [0, 1], start: 70, end: 100, height: 15, bottom: 5 }
                ],
                series: [
                    {
                        type: 'candlestick',
                        data: ohlc,
                        xAxisIndex: 0,
                        yAxisIndex: 0,
                        itemStyle: {
                            color: '#ef5350',
                            color0: '#26a69a',
                            borderColor: '#ef5350',
                            borderColor0: '#26a69a'
                        }
                    },
                    {
                        type: 'bar',
                        data: volumes,
                        xAxisIndex: 1,
                        yAxisIndex: 1,
                        itemStyle: { color: '#334155' }
                    }
                ]
            };

            klineChart.setOption(option, true);
        }

        // ===== 保存基金 =====
        function saveCurrentFund() {
            const fundCode = document.getElementById('fund_code').value.trim();
            const buyPrice = parseFloat(document.getElementById('buy_price').value);
            const shares = parseFloat(document.getElementById('shares').value);

            if (!fundCode || !buyPrice || !shares) return;

            const existingIndex = savedFunds.findIndex(f => f.fund_code === fundCode);
            // 获取基金名称（如果有当前基金信息的话）
            const fundName = currentFundInfo.name || '未知基金';
            const fundData = { 
                fund_code: fundCode, 
                fund_name: fundName,
                buy_price: buyPrice, 
                shares: shares 
            };

            if (existingIndex >= 0) {
                savedFunds[existingIndex] = fundData;
            } else {
                savedFunds.push(fundData);
            }

            localStorage.setItem('savedFunds', JSON.stringify(savedFunds));
            displaySavedFunds();
            alert('基金已保存！');
        }

        function displaySavedFunds() {
            const container = document.getElementById('savedFundsList');
            const card = document.getElementById('savedFundsCard');

            if (savedFunds.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>暂无保存的基金</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = savedFunds.map((f, i) => `
                <div class="saved-fund-item" onclick="loadSavedFund(${i})">
                    <div class="saved-fund-info">
                        <div class="saved-fund-name">${f.fund_name || '未知基金'}</div>
                        <div class="saved-fund-code">${f.fund_code} | 成本: ${f.buy_price} | 份额: ${f.shares}</div>
                    </div>
                    <div class="saved-fund-actions">
                        <button class="saved-fund-btn" onclick="event.stopPropagation(); refreshSavedFund(${i})">刷新</button>
                        <button class="saved-fund-btn delete" onclick="event.stopPropagation(); deleteSavedFund(${i})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function loadSavedFund(index) {
            const fund = savedFunds[index];
            document.getElementById('fund_code').value = fund.fund_code;
            document.getElementById('buy_price').value = fund.buy_price;
            document.getElementById('shares').value = fund.shares;
            // 自动加载该基金的分析数据
            analyzeFund();
        }

        function refreshSavedFund(index) {
            loadSavedFund(index);
            analyzeFund();
        }

        function deleteSavedFund(index) {
            savedFunds.splice(index, 1);
            localStorage.setItem('savedFunds', JSON.stringify(savedFunds));
            displaySavedFunds();
        }

        // ===== 初始化 =====
        window.onload = function() {
            // 检测服务器连接状态
            checkServerConnection();
            
            // 加载已保存基金
            const saved = localStorage.getItem('savedFunds');
            if (saved) {
                savedFunds = JSON.parse(saved);
                displaySavedFunds();
            }

            // 图表响应式
            window.addEventListener('resize', () => {
                if (chart) chart.resize();
            });
        };

        // 检测服务器连接
        async function checkServerConnection() {
            try {
                const response = await fetch('/api/fund/000001/info');
                if (response.ok) {
                    console.log('服务器连接正常');
                }
            } catch (error) {
                // 服务器未启动，显示提示
                const navActions = document.querySelector('.nav-actions');
                if (navActions) {
                    navActions.innerHTML += '<span style="color: var(--accent-red); font-size: 0.8em; margin-right: 10px;">⚠ 服务器未连接</span>';
                }
                showError('⚠ 服务器未启动，请先运行 start.bat 或 python app.py');
            }
        }

        // 回车键快捷搜索
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.target.tagName !== 'INPUT') {
                analyzeFund();
            }
        });
    </script>
</body>
</html>
